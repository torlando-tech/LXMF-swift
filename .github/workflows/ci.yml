name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout LXMF-swift
        uses: actions/checkout@v4
        with:
          path: LXMF-swift

      - name: Checkout reticulum-swift sibling
        uses: actions/checkout@v4
        with:
          repository: torlando-tech/reticulum-swift
          ref: main
          path: reticulum-swift

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve and build
        working-directory: LXMF-swift
        run: swift build

      - name: Run tests
        working-directory: LXMF-swift
        run: swift test
